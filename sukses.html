<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sukses - Rayy Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0c10, #0f1117);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            text-align: center;
            padding: 2rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 3rem;
            max-width: 500px;
            margin: 0 auto;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon {
            font-size: 80px;
            margin-bottom: 1rem;
        }

        h1 {
            color: #28a745;
            margin-bottom: 1rem;
        }

        p {
            color: #888;
            margin-bottom: 0.5rem;
        }

        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            border: none;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            margin: 0.5rem;
            cursor: pointer;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn:hover {
            opacity: 0.85;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="icon">✅</div>
            <h1>Pembayaran Berhasil!</h1>
            <p>Terima kasih telah berbelanja di Rayy Store.</p>
            <p>Silakan upload bukti pembayaran untuk konfirmasi.</p>
            <a href="upload-bukti.html" class="btn">Upload Bukti Pembayaran</a>
            <a href="rayy-store.com.html" class="btn btn-secondary">Kembali ke Toko</a>
        </div>
    </div>
</body>
</html>
