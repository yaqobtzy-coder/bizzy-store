<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Histori Belanja - Rayy Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#f8fafc;font-family:'Inter',sans-serif;overflow-x:hidden;color:#1e293b}
        
        /* SIDEBAR */
        .sidebar{position:fixed;top:0;left:-280px;width:280px;height:100%;background:#fff;z-index:1002;transition:left .3s;display:flex;flex-direction:column;box-shadow:2px 0 10px rgba(0,0,0,.1);border-right:1px solid #e2e8f0}
        .sidebar.open{left:0}
        .sidebar-header{display:flex;justify-content:space-between;align-items:center;padding:20px;border-bottom:1px solid #e2e8f0}
        .sidebar-logo{font-size:20px;font-weight:700;color:#0f172a}
        .sidebar-logo span{color:#3b82f6}
        .sidebar-close{background:0;border:none;font-size:24px;color:#94a3b8;cursor:pointer}
        .sidebar-close:hover{color:#ef4444}
        .sidebar-profile{padding:20px;text-align:center;border-bottom:1px solid #e2e8f0}
        .sidebar-avatar i{font-size:60px;color:#3b82f6}
        .sidebar-name{font-weight:600;color:#0f172a;margin-top:8px}
        .sidebar-email{font-size:11px;color:#94a3b8;margin-top:4px}
        .sidebar-nav{flex:1;padding:20px 0}
        .sidebar-link{display:flex;align-items:center;gap:12px;padding:12px 20px;color:#475569;text-decoration:none;font-size:14px;font-weight:500}
        .sidebar-link:hover{background:#f1f5f9;color:#3b82f6}
        .sidebar-link.active{background:#eef2ff;color:#3b82f6;border-right:3px solid #3b82f6}
        .sidebar-footer{padding:20px;border-top:1px solid #e2e8f0}
        .cart-icon-sidebar{display:flex;align-items:center;gap:12px;padding:10px;background:#f8fafc;border-radius:12px;cursor:pointer}
        .cart-icon-sidebar:hover{background:#eef2ff}
        .cart-icon-sidebar i{font-size:18px;color:#3b82f6}
        .cart-icon-sidebar .cart-count{background:#3b82f6;color:#fff;border-radius:50%;padding:2px 6px;font-size:10px;font-weight:600;min-width:18px;text-align:center}
        .cart-icon-sidebar span:last-child{flex:1;color:#475569;font-weight:500}
        .overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1001;display:none}
        .overlay.active{display:block}
        
        /* TOP NAVBAR */
        .top-navbar{background:#fff;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;border-bottom:1px solid #e2e8f0}
        .menu-toggle{background:0;border:none;font-size:22px;color:#475569;cursor:pointer}
        .logo-small{font-size:18px;font-weight:700;color:#0f172a}
        .logo-small span{color:#3b82f6}
        .top-cart-icon{position:relative;cursor:pointer;font-size:20px;color:#475569}
        .top-cart-icon .cart-count{position:absolute;top:-8px;right:-10px;background:#3b82f6;color:#fff;border-radius:50%;padding:2px 6px;font-size:10px;font-weight:600;min-width:18px;text-align:center}
        .main-content{min-height:100vh}
        .container{max-width:1000px;margin:0 auto;padding:30px 20px}
        .page-header{text-align:center;margin-bottom:30px}
        .page-header h1{font-size:28px;font-weight:700;color:#0f172a;margin-bottom:8px}
        .page-header h1 i{color:#3b82f6}
        .page-header p{color:#64748b;font-size:14px}
        .filter-tabs{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:25px;justify-content:center}
        .filter-btn{background:#fff;border:1px solid #e2e8f0;padding:8px 20px;border-radius:40px;color:#475569;font-weight:500;cursor:pointer;font-size:13px}
        .filter-btn.active{background:#3b82f6;color:#fff;border-color:#3b82f6}
        .history-list{display:flex;flex-direction:column;gap:16px}
        .history-card{background:#fff;border-radius:16px;border:1px solid #e2e8f0;overflow:hidden;transition:all .2s}
        .history-card:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.08)}
        .history-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;background:#f8fafc;border-bottom:1px solid #e2e8f0;flex-wrap:wrap;gap:10px}
        .history-type{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600}
        .type-sewa{background:#dcfce7;color:#16a34a}
        .type-script{background:#eef2ff;color:#3b82f6}
        .type-panel{background:#fef3c7;color:#d97706}
        .history-date{font-size:12px;color:#64748b}
        .history-body{padding:20px}
        .history-products{margin-bottom:15px}
        .product-item{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed #e2e8f0;font-size:13px}
        .product-item:last-child{border-bottom:none}
        .product-name{color:#1e293b}
        .product-price{color:#3b82f6;font-weight:600}
        .history-total{display:flex;justify-content:space-between;padding-top:12px;margin-top:8px;border-top:1px solid #e2e8f0;font-size:14px;font-weight:600}
        .total-label{color:#475569}
        .total-amount{color:#0f172a;font-size:16px}
        .history-footer{display:flex;justify-content:flex-end;gap:12px;padding:16px 20px;background:#fafcfd;border-top:1px solid #e2e8f0}
        .btn-renew{background:linear-gradient(135deg,#f59e0b,#e67e22);border:none;padding:8px 16px;border-radius:30px;color:#fff;font-weight:600;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px}
        .btn-reorder{background:#f1f5f9;border:none;padding:8px 16px;border-radius:30px;color:#475569;font-weight:600;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:6px}
        .btn-renew:hover,.btn-reorder:hover{opacity:.85}
        .empty-state{text-align:center;padding:60px 20px;background:#fff;border-radius:16px;border:1px solid #e2e8f0}
        .empty-state i{font-size:60px;color:#cbd5e1;margin-bottom:16px}
        .empty-state p{color:#64748b;font-size:14px;margin-bottom:20px}
        .btn-primary{background:#3b82f6;border:none;padding:10px 24px;border-radius:30px;color:#fff;font-weight:600;cursor:pointer;text-decoration:none;display:inline-block}
        .btn-primary:hover{background:#2563eb}
        .loading-spinner{text-align:center;padding:60px;color:#94a3b8}
        .loading-spinner i{font-size:40px;color:#3b82f6;animation:spin 1s linear infinite}
        @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
        .notification{position:fixed;bottom:20px;right:20px;padding:10px 20px;border-radius:40px;color:#fff;font-weight:500;z-index:1002;animation:slideIn .3s ease;font-size:13px}
        .notification.success{background:#22c55e}
        .notification.error{background:#ef4444}
        @keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
        @keyframes slideOut{from{transform:translateX(0);opacity:1}to{transform:translateX(100%);opacity:0}}
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:2000;display:flex;justify-content:center;align-items:center}
        .modal-content{background:#fff;border-radius:20px;width:90%;max-width:550px;max-height:85vh;overflow-y:auto;padding:24px;position:relative}
        .modal-close{position:absolute;top:15px;right:20px;background:0;border:none;font-size:24px;color:#94a3b8;cursor:pointer}
        .modal-close:hover{color:#ef4444}
        .modal-content h3{color:#0f172a;margin-bottom:20px;font-size:18px;font-weight:600;border-left:3px solid #3b82f6;padding-left:12px}
        .form-group{margin-bottom:16px}
        .form-group label{display:block;color:#334155;margin-bottom:6px;font-size:13px;font-weight:500}
        .form-group input,.form-group select{width:100%;padding:10px 12px;background:#fff;border:1px solid #cbd5e1;border-radius:8px;color:#1e293b;font-size:14px;font-family:inherit}
        .form-group input:focus,.form-group select:focus{outline:0;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
        .voucher-section{background:#fef3c7;border-radius:12px;padding:16px;margin:16px 0;border:1px solid #fde68a}
        .voucher-section label{color:#92400e;font-weight:600}
        .voucher-input-group{display:flex;gap:10px;margin-top:8px}
        .voucher-input-group input{flex:1;padding:10px;border:1px solid #fcd34d;border-radius:8px;background:#fffbeb}
        .voucher-input-group button{background:#d97706;border:none;padding:10px 16px;border-radius:8px;color:#fff;font-weight:600;cursor:pointer}
        .voucher-input-group button:hover{background:#b45309}
        .voucher-info-applied{background:#dcfce7;padding:12px;border-radius:8px;margin-top:10px;display:flex;justify-content:space-between;align-items:center}
        .voucher-info-applied span{color:#166534;font-weight:600}
        .voucher-info-applied button{background:0;border:none;color:#dc2626;cursor:pointer;font-size:16px}
        .total-renew{background:#f1f5f9;border-radius:12px;padding:16px;margin:16px 0;text-align:center}
        .total-renew .label{font-size:13px;color:#64748b}
        .total-renew .amount{font-size:24px;font-weight:700;color:#0f172a}
        .total-renew .discount{color:#16a34a;font-size:14px;margin-top:5px}
        .checkbox-group{margin:16px 0}
        .checkbox-label{display:flex;align-items:center;gap:10px;cursor:pointer;color:#334155;font-size:13px;font-weight:500}
        .checkbox-label input{width:18px;height:18px;cursor:pointer;margin:0}
        .music-modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);z-index:2000;display:flex;justify-content:center;align-items:center}
        .music-modal-content{background:#fff;border-radius:20px;width:90%;max-width:500px;max-height:85vh;overflow-y:auto}
        .music-modal-header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid #e2e8f0}
        .close-modal{background:0;border:none;color:#94a3b8;font-size:24px;cursor:pointer}
        .music-modal-body{padding:20px}
        .floating-player{position:fixed;bottom:20px;right:20px;width:280px;background:#fff;border-radius:60px;box-shadow:0 8px 25px rgba(0,0,0,.15);z-index:1500;border:1px solid #e2e8f0}
        .floating-player-content{display:flex;align-items:center;padding:8px 12px;gap:10px}
        .floating-info{flex:1;min-width:0}
        .floating-title{font-size:12px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .floating-artist{font-size:10px;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .floating-controls{display:flex;gap:8px}
        .floating-controls button{background:#f1f5f9;border:none;width:32px;height:32px;border-radius:50%;cursor:pointer}
        .floating-controls button:hover{background:#3b82f6;color:#fff}
        .floating-drag{cursor:grab;color:#94a3b8;padding:0 5px}
        @media (max-width:768px){
            .page-header h1{font-size:22px}
            .filter-tabs{gap:8px}
            .filter-btn{padding:6px 14px;font-size:12px}
            .history-header{flex-direction:column;align-items:flex-start}
            .history-footer{flex-direction:column}
            .btn-renew,.btn-reorder{width:100%;justify-content:center}
            .sidebar{width:260px;left:-260px}
            .modal-content{width:95%;padding:20px}
        }
        @media (min-width:769px){.menu-toggle{display:none}}
    </style>
</head>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>

    <script src="firebase-config.js"></script>
    <script src="telegram-notif.js"></script>
    <script>
        // ==================== HISTORY PAGE - HANYA PESANAN VALID ====================
        let allOrders = [];
        let currentFilter = 'all';
        let currentUserName = '';
        let musicPlayer = {audio:null,currentTrack:null,isPlaying:false,volume:70,playHistory:[],updateInterval:null};
        let currentProductPrice = 0;
        let activeVoucher = null;
        let voucherDiscount = 0;

        // STATUS VALID UNTUK HISTORY (HANYA PESANAN YANG SUDAH SELESAI)
        // Hanya tampilkan pesanan dengan status: done, completed, active, approved, success
        const VALID_HISTORY_STATUS = ['done', 'completed', 'active', 'approved', 'success', 'aktif'];
        
        // STATUS YANG TIDAK DITAMPILKAN (pending, cancelled, expired, rejected)
        const INVALID_HISTORY_STATUS = ['pending', 'pending_approval', 'cancelled', 'expired', 'rejected', 'menunggu'];

        function openSidebar(){document.getElementById('sidebar').classList.add('open');document.getElementById('overlay').classList.add('active');}
        function closeSidebar(){document.getElementById('sidebar').classList.remove('open');document.getElementById('overlay').classList.remove('active');}
        function toggleSidebar(){const s=document.getElementById('sidebar');if(s.classList.contains('open'))closeSidebar();else openSidebar();}
        
        function updateSidebarProfile(){
            const un=localStorage.getItem('userName')||'Customer';
            const ue=localStorage.getItem('userEmail')||'customer@rayystore.com';
            const sn=document.getElementById('sidebarName'),se=document.getElementById('sidebarEmail');
            if(sn)sn.innerText=un;if(se)se.innerText=ue;currentUserName=un;
        }
        
        function updateCartCount(){
            const cart=JSON.parse(localStorage.getItem('cart'))||[];
            const total=cart.reduce((s,i)=>s+(i.quantity||1),0);
            const tc=document.getElementById('topCartCount'),sc=document.getElementById('sidebarCartCount');
            if(tc)tc.textContent=total;if(sc)sc.textContent=total;
        }
        
        function escapeHtml(t){if(!t)return '';const d=document.createElement('div');d.textContent=t;return d.innerHTML;}
        function formatNumber(n){if(!n||isNaN(n))return '0';return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g,".");}
        function formatDate(ds){if(!ds)return '-';const d=new Date(ds);if(isNaN(d.getTime()))return '-';return d.toLocaleDateString('id-ID',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}).replace(/\./g,':');}
        
        function showToast(msg,type){
            const old=document.querySelector('.notification');if(old)old.remove();
            const n=document.createElement('div');n.className=`notification ${type}`;
            n.innerHTML=`<i class="fas ${type==='success'?'fa-check-circle':'fa-exclamation-circle'}"></i> ${msg}`;
            document.body.appendChild(n);
            setTimeout(()=>{if(n){n.style.animation='slideOut .3s ease';setTimeout(()=>{if(n&&n.remove)n.remove();},300);}},3000);
        }
        
        function getOrderType(order){
            if(order.type)return order.type;
            if(order.customerData?.type)return order.customerData.type;
            if(order.cart?.[0]?.type)return order.cart[0].type;
            if(order.linkGroup)return 'sewa';
            if(order.panelUsername)return 'panel';
            return 'script';
        }
        
        function getTypeClass(type){
            if(type==='sewa')return 'type-sewa';
            if(type==='script')return 'type-script';
            if(type==='panel')return 'type-panel';
            return 'type-script';
        }
        
        function getTypeIcon(type){
            if(type==='sewa')return 'fas fa-calendar-alt';
            if(type==='script')return 'fas fa-code';
            if(type==='panel')return 'fas fa-server';
            return 'fas fa-shopping-bag';
        }
        
        function getOrderProducts(order){
            if(order.cart && order.cart.length>0) return order.cart;
            if(order.productName) return [{name:order.productName, price:order.productPrice||order.total, quantity:1}];
            return [{name:'Produk Digital', price:order.total||0, quantity:1}];
        }
        
        function getOrderTotal(order){
            if(order.total) return order.total;
            if(order.productPrice) return order.productPrice;
            if(order.cart) return order.cart.reduce((s,i)=>s+(i.price*(i.quantity||1)),0);
            return 0;
        }
        
        function getBuyerDataFromOrder(order){
            let bn='',bp='',lg='';
            if(order.customerData){
                bn=order.customerData.buyerName||order.customerData.wajib?.ownerName||order.customerData.ownerName||'';
                bp=order.customerData.buyerPhone||order.customerData.wajib?.ownerPhone||order.customerData.ownerPhone||'';
                lg=order.customerData.linkGroup||'';
            }
            if(order.buyerName&&!bn) bn=order.buyerName;
            if(order.buyerPhone&&!bp) bp=order.buyerPhone;
            if(order.linkGroup&&!lg) lg=order.linkGroup;
            if(order.username&&!bn) bn=order.username;
            if(!bn) bn=localStorage.getItem('userName')||'Customer';
            if(!bp) bp=localStorage.getItem('userPhone')||'';

        function getProductFromOrder(order){
            if(order.cart && order.cart[0]) return order.cart[0];
            if(order.productName) return {name:order.productName, price:order.productPrice||order.total, duration:order.duration||order.durasi+' Hari'||'7 Hari'};
            return null;
        }
        
        // CEK APAKAH PESANAN VALID UNTUK DITAMPILKAN DI HISTORY
        function isValidHistoryOrder(order) {
            const status = (order.status || '').toLowerCase();
            // Jika status termasuk valid, tampilkan
            if (VALID_HISTORY_STATUS.includes(status)) return true;
            // Jika status termasuk invalid, jangan tampilkan
            if (INVALID_HISTORY_STATUS.includes(status)) return false;
            // Fallback: tampilkan hanya jika status bukan pending
            return status !== 'pending' && status !== 'pending_approval' && status !== 'cancelled';
        }
        
        // ========== LOAD ORDER HISTORY (HANYA YANG VALID) ==========
        async function loadOrderHistory(){
            const c=document.getElementById('historyList');if(!c)return;

            let userName = localStorage.getItem('userName');
            if(!userName || userName==='Customer' || userName==='null'){
                userName = localStorage.getItem('buyerName');
            }
            if(!userName || userName==='Customer' || userName==='null'){
                c.innerHTML=`<div class="empty-state"><i class="fas fa-user-slash"></i><p>Login dulu ya!</p><a href="profile.html" class="btn-primary">Login Sekarang</a></div>`;
                return;
            }
            
            allOrders=[];
            try{
                // BACA DARI sewa_orders (UTAMA) - HANYA YANG VALID
                const sewaSnap=await database.ref('sewa_orders').once('value');
                console.log('🔍 Memeriksa sewa_orders untuk history...');
                if(sewaSnap.exists()){
                    sewaSnap.forEach(ch=>{
                        const o=ch.val();o.orderId=ch.key;o.type='sewa';
                        const isUser = (o.buyerName === userName || o.username === userName);
                        const isValid = isValidHistoryOrder(o);

                        if(isUser && isValid) allOrders.push(o);
                    });
                }
                
                // BACA DARI orders (BACKUP) - HANYA YANG VALID
                const orderSnap=await database.ref('orders').once('value');
                if(orderSnap.exists()){
                    orderSnap.forEach(ch=>{
                        const o=ch.val();o.orderId=ch.key;
                        let isUser=false;
                        if(o.customerData?.buyerName===userName||o.customerData?.wajib?.ownerName===userName) isUser=true;
                        if(o.buyerName===userName||o.username===userName) isUser=true;
                        const isValid = isValidHistoryOrder(o);
                        if(isUser && isValid && !allOrders.some(a=>a.orderId===o.orderId)) allOrders.push(o);
                    });
                }
                
                // BACA DARI panel_orders - HANYA YANG VALID
                const panelSnap=await database.ref('panel_orders').once('value');
                if(panelSnap.exists()){
                    panelSnap.forEach(ch=>{
                        const o=ch.val();o.orderId=ch.key;o.type='panel';
                        const isUser = (o.username===userName||o.panelUsername===userName||o.buyerName===userName);
                        const isValid = isValidHistoryOrder(o);
                        if(isUser && isValid && !allOrders.some(a=>a.orderId===o.orderId)) allOrders.push(o);
                    });
                }
                
                allOrders.sort((a,b)=>new Date(b.createdAt||b.timestamp||0)-new Date(a.createdAt||a.timestamp||0));
                
                if(allOrders.length === 0){
                    c.innerHTML=`<div class="empty-state"><i class="fas fa-inbox"></i><p>Belum ada riwayat transaksi selesai</p><p style="font-size:12px; margin-top:8px;">Hanya pesanan yang sudah dibayar dan selesai yang muncul di sini</p><a href="rayy-store.com.html" class="btn-primary">Belanja Yuk</a></div>`;
                    return;
                }
                
                renderHistory();
            }catch(e){console.error(e);c.innerHTML=`<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>Gagal memuat.</p><button onclick="loadOrderHistory()" class="btn-primary">Coba Lagi</button></div>`;}

        function updateRenewTotal(originalPrice){
            let finalPrice=originalPrice,discountAmount=0;
            if(activeVoucher&&voucherDiscount>0){
                discountAmount=Math.min(voucherDiscount,originalPrice);
                finalPrice=originalPrice-discountAmount;
                if(finalPrice<0)finalPrice=0;
                const vt=document.getElementById('voucherAppliedText');if(vt)vt.innerHTML=`${activeVoucher.code} - Rp ${formatNumber(discountAmount)}`;
                const vd=document.getElementById('voucherAppliedRenew');if(vd)vd.style.display='flex';
            }else{const vd=document.getElementById('voucherAppliedRenew');if(vd)vd.style.display='none';}
            const te=document.getElementById('renewTotalAmount'),de=document.getElementById('renewDiscountText');
            if(te){
                if(finalPrice<=0){te.innerHTML='🎉 GRATIS!';te.style.color='#16a34a';}
                else{te.innerHTML=`Rp ${formatNumber(finalPrice)}`;te.style.color='#0f172a';}
            }
            if(de&&discountAmount>0){de.innerHTML=`Diskon: Rp ${formatNumber(discountAmount)}`;de.style.display='block';}
            else if(de)de.style.display='none';
        }
        
        async function applyVoucherToRenew(){
            const code=document.getElementById('voucherCodeRenew')?.value.trim().toUpperCase();
            if(!code){showToast('Masukkan kode voucher!','error');return;}
            try{
                const snap=await database.ref('vouchers').orderByChild('code').equalTo(code).once('value');
                if(snap.exists()){
                    let voucher=null;
                    snap.forEach(c=>{voucher={id:c.key,...c.val()};});
                    if(voucher){
                        const now=new Date(),exp=new Date(voucher.expiredAt);
                        if(voucher.used>=voucher.usageLimit){showToast('Voucher sudah mencapai batas penggunaan!','error');return;}
                        if(exp<now){showToast('Voucher sudah kadaluarsa!','error');return;}
                        activeVoucher=voucher;
                        if(voucher.type==='percentage') voucherDiscount=(currentProductPrice*voucher.value)/100;
                        else voucherDiscount=Math.min(voucher.value,currentProductPrice);
                        updateRenewTotal(currentProductPrice);
                        showToast(`✅ Voucher ${voucher.code} berhasil dipakai!`,'success');
                    }
                }else{showToast('Kode voucher tidak valid!','error');}
            }catch(e){console.error(e);showToast('Gagal memeriksa voucher','error');}
        }
        
        function removeVoucherFromRenew(){
            activeVoucher=null;voucherDiscount=0;
            const vi=document.getElementById('voucherCodeRenew');if(vi)vi.value='';
            updateRenewTotal(currentProductPrice);
            showToast('Voucher dihapus','success');
        }
        
        function closeRenewModal(){const m=document.getElementById('renewModal');if(m)m.remove();}
        
        async function processRenew(){
            const bn=document.getElementById('renewBuyerName')?.value;
            const bp=document.getElementById('renewBuyerPhone')?.value;
            const lg=document.getElementById('renewLinkGroup')?.value;
            const sel=document.getElementById('renewProductSelect');
            if(!bn||!bp||!lg||!sel){showToast('Error: Data tidak lengkap','error');return;}
            const o=sel.options[sel.selectedIndex],pid=sel.value,pn=o.dataset.name,pp=parseInt(o.dataset.price),dur=o.dataset.duration;
            let fp=pp;if(activeVoucher&&voucherDiscount>0){fp=pp-Math.min(voucherDiscount,pp);if(fp<0)fp=0;}
            try{
                const ps=await database.ref(`products/sewa/${pid}`).once('value');const prod=ps.val();
                if(!prod||prod.stock<=0){showToast('Produk habis stok!','error');return;}
                const cart=[{id:pid,name:pn,price:pp,quantity:1,type:'sewa',duration:dur,thumbnail:prod.thumbnail||'https://placehold.co/300x200/1a1d24/4facfe?text=Sewa+Bot',allowVoucher:true}];
                const od={type:'sewa',buyerName:bn,buyerPhone:bp,linkGroup:lg,notes:'Perpanjangan sewa',durasi:parseInt(dur)||7,cart:cart,total:fp,isRenew:true,createdAt:new Date().toISOString()};
                if(activeVoucher) od.voucherUsed={code:activeVoucher.code,discount:voucherDiscount,type:activeVoucher.type};
                localStorage.setItem('checkoutCart',JSON.stringify(cart));
                localStorage.setItem('checkoutTotal',fp);
                localStorage.setItem('orderData',JSON.stringify(od));
                localStorage.setItem('buyerName',bn);
                if(activeVoucher) localStorage.setItem('activeVoucher',JSON.stringify({code:activeVoucher.code,discount:voucherDiscount,type:activeVoucher.type}));
                closeRenewModal();
                showToast('Mengalihkan ke pembayaran...','success');
                setTimeout(()=>{window.location.href='pay.html';},1000);
            }catch(e){console.error(e);showToast('Gagal memproses perpanjangan','error');}
        }
        
        function reorder(order){
            let products=[];
            if(order.cart && order.cart.length>0) products=order.cart.map(i=>({id:i.id,name:i.name,price:i.price,quantity:i.quantity||1,type:i.type,thumbnail:i.thumbnail,allowVoucher:i.allowVoucher!==false}));
            else if(order.productName) products=[{id:order.productId,name:order.productName,price:order.productPrice||order.total,quantity:1,type:order.type||'script',allowVoucher:true}];
            if(products.length===0){showToast('Data produk tidak ditemukan!','error');return;}
            let ec=JSON.parse(localStorage.getItem('cart'))||[];
            products.forEach(np=>{const ex=ec.find(i=>i.id===np.id);if(ex)ex.quantity=(ex.quantity||1)+(np.quantity||1);else ec.push(np);});
            localStorage.setItem('cart',JSON.stringify(ec));updateCartCount();
            showToast('Produk ditambahkan ke keranjang!','success');
            setTimeout(()=>{window.location.href='rayy-store.com.html';},1000);
        }

        async function searchMusic(q){const rl=document.getElementById('musicResultsList');if(!q.trim()){rl.innerHTML='<div class="empty-message">Masukkan judul lagu</div>';return;}

        function playMusic(title,url,thumbnail,artist){if(!url||url==='undefined'){showToast('URL tidak valid','error');return;}

            musicPlayer.currentTrack={title,url,thumbnail,artist};musicPlayer.audio=a;a.src=url;a.load();a.play().catch(e=>console.log(e));musicPlayer.isPlaying=true;
            const np=document.getElementById('musicNowPlaying'),mt=document.getElementById('musicThumb'),mti=document.getElementById('musicTitle'),ma=document.getElementById('musicArtist'),ppb=document.getElementById('musicPlayPauseBtn');
            if(np)np.style.display='flex';if(mt)mt.src=thumbnail||'https://via.placeholder.com/60x60?text=🎵';if(mti)mti.innerText=title||'Unknown';if(ma)ma.innerText=artist||'Unknown';if(ppb)ppb.innerHTML='<i class="fas fa-pause"></i>';
            updateFloatingPlayer({title,thumbnail,artist});addToMusicHistory({title,url,thumbnail,artist});showToast(`🎵 Memutar: ${title}`,'success');startProgressUpdate();
        }
        function addToMusicHistory(t){if(!t||!t.title)return;musicPlayer.playHistory=musicPlayer.playHistory.filter(h=>h.url!==t.url);musicPlayer.playHistory.unshift({title:t.title,url:t.url,thumbnail:t.thumbnail,artist:t.artist,timestamp:new Date().toISOString()});if(musicPlayer.playHistory.length>20)musicPlayer.playHistory=musicPlayer.playHistory.slice(0,20);saveMusicHistory();renderMusicHistory();const hs=document.getElementById('musicHistorySection');if(hs)hs.style.display='block';}
        function stopMusic(){if(musicPlayer.audio){musicPlayer.audio.pause();musicPlayer.audio.currentTime=0;musicPlayer.isPlaying=false;musicPlayer.currentTrack=null;
            const np=document.getElementById('musicNowPlaying'),ppb=document.getElementById('musicPlayPauseBtn'),pf=document.getElementById('musicProgressFilled'),ct=document.getElementById('musicCurrentTime');
            if(np)np.style.display='none';if(ppb)ppb.innerHTML='<i class="fas fa-play"></i>';if(pf)pf.style.width='0%';if(ct)ct.innerText='0:00';updateFloatingPlayer(null);if(musicPlayer.updateInterval)clearInterval(musicPlayer.updateInterval);showToast('⏹️ Musik dihentikan','success');}}
        function togglePlayPause(){if(!musicPlayer.audio||!musicPlayer.currentTrack){showToast('Pilih lagu dulu','error');return;}
            if(musicPlayer.isPlaying){musicPlayer.audio.pause();musicPlayer.isPlaying=false;const ppb=document.getElementById('musicPlayPauseBtn'),fpp=document.getElementById('floatingPlayPause');if(ppb)ppb.innerHTML='<i class="fas fa-play"></i>';if(fpp)fpp.innerHTML='<i class="fas fa-play"></i>';}else{musicPlayer.audio.play().catch(e=>console.log(e));musicPlayer.isPlaying=true;const ppb=document.getElementById('musicPlayPauseBtn'),fpp=document.getElementById('floatingPlayPause');if(ppb)ppb.innerHTML='<i class="fas fa-pause"></i>';if(fpp)fpp.innerHTML='<i class="fas fa-pause"></i>';startProgressUpdate();}}
        function startProgressUpdate(){if(musicPlayer.updateInterval)clearInterval(musicPlayer.updateInterval);musicPlayer.updateInterval=setInterval(()=>{if(musicPlayer.audio&&musicPlayer.audio.duration&&musicPlayer.isPlaying){const c=musicPlayer.audio.currentTime,d=musicPlayer.audio.duration,p=(c/d)*100;const pf=document.getElementById('musicProgressFilled'),ct=document.getElementById('musicCurrentTime'),de=document.getElementById('musicDuration');if(pf)pf.style.width=p+'%';if(ct)ct.innerText=formatMusicTime(c);if(de)de.innerText=formatMusicTime(d);}},500);}
        function formatMusicTime(s){if(!s||isNaN(s))return '0:00';const m=Math.floor(s/60),sc=Math.floor(s%60);return `${m}:${sc.toString().padStart(2,'0')}`;}
        function setMusicVolume(v){musicPlayer.volume=v;if(musicPlayer.audio)musicPlayer.audio.volume=v/100;const vs=document.getElementById('musicVolumeSlider');if(vs)vs.value=v;localStorage.setItem('rayy_music_volume',v);}
        function openMusicModal(){const m=document.getElementById('musicModal');if(m)m.style.display='flex';loadMusicHistory();}
        function closeMusicModal(){const m=document.getElementById('musicModal');if(m)m.style.display='none';}
        let isDragging=false,dragStartX,dragStartY;
        function initFloatingPlayer(){const fp=document.getElementById('floatingPlayer'),dh=document.getElementById('floatingDrag');if(!dh)return;
            dh.addEventListener('mousedown',startDrag);dh.addEventListener('touchstart',startDrag,{passive:false});document.addEventListener('mousemove',onDrag);document.addEventListener('mouseup',stopDrag);document.addEventListener('touchmove',onDrag,{passive:false});document.addEventListener('touchend',stopDrag);
            document.getElementById('floatingPlayPause').onclick=togglePlayPause;document.getElementById('floatingStop').onclick=stopMusic;document.getElementById('floatingClose').onclick=()=>{stopMusic();if(fp)fp.style.display='none';};
        }
        function startDrag(e){isDragging=true;const fp=document.getElementById('floatingPlayer');if(!fp)return;const rect=fp.getBoundingClientRect();
            if(e.type==='mousedown'){dragStartX=e.clientX-rect.left;dragStartY=e.clientY-rect.top;}else{dragStartX=e.touches[0].clientX-rect.left;dragStartY=e.touches[0].clientY-rect.top;}
            fp.style.transition='none';e.preventDefault();}
        function onDrag(e){if(!isDragging)return;let cx,cy;if(e.type==='mousemove'){cx=e.clientX;cy=e.clientY;}else{cx=e.touches[0].clientX;cy=e.touches[0].clientY;}
            const fp=document.getElementById('floatingPlayer');if(!fp)return;let nx=cx-dragStartX,ny=cy-dragStartY;const mx=window.innerWidth-fp.offsetWidth-10,my=window.innerHeight-fp.offsetHeight-10;
            nx=Math.min(Math.max(nx,10),mx);ny=Math.min(Math.max(ny,10),my);fp.style.left=nx+'px';fp.style.top=ny+'px';fp.style.right='auto';fp.style.bottom='auto';e.preventDefault();}
        function stopDrag(){isDragging=false;const fp=document.getElementById('floatingPlayer');if(fp)fp.style.transition='';}
        function updateFloatingPlayer(t){const fp=document.getElementById('floatingPlayer');if(!fp)return;if(!t){fp.style.display='none';return;}
            fp.style.display='block';const ft=document.getElementById('floatingThumb'),fti=document.getElementById('floatingTitle'),fa=document.getElementById('floatingArtist'),fpp=document.getElementById('floatingPlayPause');
            if(ft)ft.src=t.thumbnail||'https://via.placeholder.com/40x40?text=🎵';if(fti)fti.innerText=t.title||'Unknown';if(fa)fa.innerText=t.artist||'Unknown';if(fpp)fpp.innerHTML=musicPlayer.isPlaying?'<i class="fas fa-pause"></i>':'<i class="fas fa-play"></i>';
        }
        function initMusicEventListeners(){
            document.getElementById('sidebarMusicBtn').onclick=(e)=>{e.preventDefault();openMusicModal();};
            document.getElementById('closeMusicModal').onclick=closeMusicModal;
            document.getElementById('musicPlayPauseBtn').onclick=togglePlayPause;
            document.getElementById('musicStopBtn').onclick=stopMusic;
            document.getElementById('musicSearchBtn').onclick=()=>searchMusic(document.getElementById('musicSearchInput').value);
            document.getElementById('musicSearchInput').onkeypress=(e)=>{if(e.key==='Enter')searchMusic(e.target.value);};
            document.getElementById('musicVolumeSlider').oninput=(e)=>setMusicVolume(parseInt(e.target.value));
            document.getElementById('musicVolDown').onclick=()=>setMusicVolume(Math.max(0,musicPlayer.volume-10));
            document.getElementById('musicVolUp').onclick=()=>setMusicVolume(Math.min(100,musicPlayer.volume+10));
            document.getElementById('musicProgressBar').onclick=(e)=>{if(musicPlayer.audio&&musicPlayer.audio.duration){const rect=e.currentTarget.getBoundingClientRect();const percent=(e.clientX-rect.left)/rect.width;musicPlayer.audio.currentTime=percent*musicPlayer.audio.duration;}};
            document.getElementById('clearMusicHistory').onclick=clearMusicHistory;
            document.getElementById('musicModal').onclick=(e)=>{if(e.target===document.getElementById('musicModal'))closeMusicModal();};
            const sv=localStorage.getItem('rayy_music_volume');if(sv)setMusicVolume(parseInt(sv));else setMusicVolume(70);
        }
        
        document.addEventListener('DOMContentLoaded',function(){
            document.getElementById('menuToggle').onclick=toggleSidebar;
            document.getElementById('sidebarClose').onclick=closeSidebar;
            updateSidebarProfile();updateCartCount();loadOrderHistory();initFilters();initMusicEventListeners();initFloatingPlayer();
        });
        
        window.closeRenewModal=closeRenewModal;
        window.renewSewa=renewSewa;
        window.reorder=reorder;
        window.processRenew=processRenew;
        window.applyVoucherToRenew=applyVoucherToRenew;
        window.removeVoucherFromRenew=removeVoucherFromRenew;
        window.closeSidebar=closeSidebar;
        window.openSidebar=openSidebar;
        window.toggleSidebar=toggleSidebar;
        window.loadOrderHistory=loadOrderHistory;
    </script>
</body>
</html>
