<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Bizzy Music Player - Streaming Lagu</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            transition: all 0.3s ease;
        }

        /* LIGHT MODE */
        body.light {
            background: linear-gradient(135deg, #f0f4ff, #e6edfc);
            color: #1a2a6c;
        }
        body.light .music-card, body.light .search-section {
            background: rgba(255,255,255,0.9);
            border: 1px solid #bbdefb;
        }
        body.light .result-item {
            background: rgba(0,0,0,0.03);
        }
        body.light .result-item:hover {
            background: rgba(30,136,229,0.1);
        }
        body.light .now-playing-title {
            color: #0d47a1;
        }
        body.light .control-btn {
            background: #e3f2fd;
            color: #0d47a1;
        }
        body.light .control-btn:hover {
            background: #1e88e5;
            color: white;
        }
        body.light .toast {
            background: white;
            color: #0d47a1;
            border-left-color: #1e88e5;
        }

        /* DARK MODE */
        body.dark {
            background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
            color: #e0e0e0;
        }
        body.dark .music-card, body.dark .search-section {
            background: rgba(0,0,0,0.7);
            border: 1px solid rgba(255,215,0,0.3);
        }
        body.dark .result-item {
            background: rgba(255,255,255,0.05);
        }
        body.dark .result-item:hover {
            background: rgba(255,215,0,0.15);
        }
        body.dark .now-playing-title {
            color: #ffd700;
        }
        body.dark .control-btn {
            background: rgba(255,215,0,0.15);
            color: #ffd700;
        }
        body.dark .control-btn:hover {
            background: #ffd700;
            color: #1a1a1a;
        }

        /* Header */
        .music-header {
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border: 1px solid rgba(255,215,0,0.2);
        }
        .music-header h1 {
            font-size: 1.3rem;
            background: linear-gradient(135deg, #FFD966, #FF8C00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            flex: 1;
        }
        .back-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: white;
            padding: 8px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .back-btn:hover {
            background: rgba(255,215,0,0.3);
        }

        /* Container */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 30px;
        }

        /* Now Playing Card */
        .music-card {
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }

        .now-playing-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }

        .now-playing-img {
            width: 70px;
            height: 70px;
            border-radius: 16px;
            object-fit: cover;
        }

        .now-playing-info {
            flex: 1;
        }

        .now-playing-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 4px;
        }

        .now-playing-artist {
            font-size: 0.75rem;
            opacity: 0.7;
        }

        /* Controls */
        .controls-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .control-btn {
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.2s;
        }

        .volume-controls {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-top: 15px;
        }

        .volume-btn {
            background: rgba(255,215,0,0.15);
            border: none;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .volume-slider {
            flex: 1;
            max-width: 200px;
        }

        .volume-slider input {
            width: 100%;
            cursor: pointer;
            height: 4px;
            border-radius: 5px;
        }

        /* Search Section */
        .search-section {
            border-radius: 28px;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .search-box input {
            flex: 1;
            padding: 14px 18px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,215,0,0.3);
            border-radius: 40px;
            font-size: 0.9rem;
            outline: none;
        }

        body.light .search-box input {
            background: rgba(0,0,0,0.05);
            border-color: #bbdefb;
            color: #1a2a6c;
        }

        body.dark .search-box input {
            background: rgba(255,255,255,0.08);
            border-color: rgba(255,215,0,0.3);
            color: white;
        }

        .search-box input:focus {
            border-color: #ffd700;
        }

        .search-box button {
            padding: 0 25px;
            background: linear-gradient(95deg, #ffd700, #ff9900);
            border: none;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .search-box button:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        .results-title {
            font-size: 0.8rem;
            margin-bottom: 12px;
            color: #ffd700;
            letter-spacing: 1px;
        }

        .results-list {
            max-height: 350px;
            overflow-y: auto;
            border-radius: 16px;
        }

        .results-list::-webkit-scrollbar {
            width: 5px;
        }

        .results-list::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
        }

        .results-list::-webkit-scrollbar-thumb {
            background: #ffd700;
            border-radius: 10px;
        }

        .result-item {
            border-radius: 16px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            gap: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .result-item:hover {
            transform: translateX(5px);
        }

        .result-thumb {
            width: 55px;
            height: 55px;
            border-radius: 12px;
            object-fit: cover;
        }

        .result-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .result-title {
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 4px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .result-artist {
            font-size: 0.7rem;
            opacity: 0.6;
        }

        .result-duration {
            font-size: 0.7rem;
            color: #ffd700;
            margin-top: 3px;
        }

        .loading-indicator {
            text-align: center;
            padding: 30px;
            color: #ffd700;
        }

        .empty-message {
            text-align: center;
            padding: 30px;
            opacity: 0.6;
            font-size: 0.85rem;
        }

        /* Progress Bar */
        .progress-container {
            margin-top: 15px;
            margin-bottom: 10px;
        }
        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 5px;
            cursor: pointer;
            position: relative;
        }
        .progress-filled {
            width: 0%;
            height: 100%;
            background: #ffd700;
            border-radius: 5px;
            transition: width 0.1s linear;
        }
        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.65rem;
            margin-top: 5px;
            opacity: 0.7;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 20px;
            right: 20px;
            max-width: 400px;
            margin: 0 auto;
            padding: 12px 20px;
            border-radius: 40px;
            text-align: center;
            z-index: 2000;
            font-size: 0.85rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100%);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.65rem;
            opacity: 0.5;
        }

        #backgroundAudio {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="music-header">
            <button class="back-btn" onclick="goBackToHome()"><i class="fas fa-arrow-left"></i> Kembali</button>
            <h1><i class="fas fa-music"></i> Bizzy Music</h1>
        </div>

        <!-- Now Playing Section -->
        <div class="music-card" id="nowPlayingCard" style="display: none;">
            <div class="now-playing-header">
                <img id="nowPlayingThumb" class="now-playing-img" src="https://via.placeholder.com/70x70?text=🎵" alt="Cover">
                <div class="now-playing-info">
                    <div class="now-playing-title" id="nowPlayingTitle">Tidak ada lagu</div>
                    <div class="now-playing-artist" id="nowPlayingArtist">-</div>
                </div>
                <button class="control-btn" id="stopMusicBtn" style="width: 40px; height: 40px; font-size: 1rem;">
                    <i class="fas fa-stop"></i>
                </button>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar">
                    <div class="progress-filled" id="progressFilled"></div>
                </div>
                <div class="time-info">
                    <span id="currentTime">0:00</span>
                    <span id="durationTime">0:00</span>
                </div>
            </div>
            <div class="controls-row">
                <button class="control-btn" id="playPauseBtnMain"><i class="fas fa-play"></i></button>
            </div>
            <div class="volume-controls">
                <button class="volume-btn" id="volumeDownBtn"><i class="fas fa-volume-down"></i></button>
                <div class="volume-slider">
                    <input type="range" id="volumeSlider" min="0" max="100" value="70">
                </div>
                <button class="volume-btn" id="volumeUpBtn"><i class="fas fa-volume-up"></i></button>
            </div>
        </div>

        <!-- Search Section -->
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Cari lagu... Contoh: Tak Ingin Usai, Runtuh, Komang">
                <button id="searchBtn"><i class="fas fa-search"></i> Cari</button>
            </div>
            <div class="results-title">
                <i class="fas fa-headphones"></i> HASIL PENCARIAN
            </div>
            <div class="results-list" id="resultsList">
                <div class="empty-message">
                    <i class="fas fa-search"></i> Cari lagu favoritmu
                </div>
            </div>
        </div>

        <div class="footer">
            <p>© 2026 Bizzy Impact | Music Player</p>
        </div>
    </div>

    <audio id="backgroundAudio" preload="auto"></audio>

    <script>
        // ========== AMBIL TEMA DARI localStorage (SINKRON DENGAN WEB UTAMA) ==========
        function loadThemeFromMain() {
            const savedTheme = localStorage.getItem('bizzy_theme_mode');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark');
                document.body.classList.remove('light');
            } else if (savedTheme === 'light') {
                document.body.classList.add('light');
                document.body.classList.remove('dark');
            } else {
                // Default dark
                document.body.classList.add('dark');
                document.body.classList.remove('light');
            }
        }
        loadThemeFromMain();

        // ========== MUSIC PLAYER CORE ==========
        const audioElement = document.getElementById('backgroundAudio');
        let currentTrack = null;
        let isPlaying = false;

        // DOM Elements
        const nowPlayingCard = document.getElementById('nowPlayingCard');
        const nowPlayingThumb = document.getElementById('nowPlayingThumb');
        const nowPlayingTitle = document.getElementById('nowPlayingTitle');
        const nowPlayingArtist = document.getElementById('nowPlayingArtist');
        const playPauseBtn = document.getElementById('playPauseBtnMain');
        const stopBtn = document.getElementById('stopMusicBtn');
        const volumeSlider = document.getElementById('volumeSlider');
        const volumeUpBtn = document.getElementById('volumeUpBtn');
        const volumeDownBtn = document.getElementById('volumeDownBtn');
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const resultsList = document.getElementById('resultsList');
        const progressBar = document.getElementById('progressBar');
        const progressFilled = document.getElementById('progressFilled');
        const currentTimeSpan = document.getElementById('currentTime');
        const durationTimeSpan = document.getElementById('durationTime');

        // Helper: Format duration
        function formatDuration(seconds) {
            if (!seconds || isNaN(seconds)) return '0:00';
            const minutes = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${minutes}:${secs.toString().padStart(2, '0')}`;
        }

        // Escape HTML
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
        }

        // Show Toast
        function showToast(message) {
            const existingToast = document.querySelector('.toast');
            if (existingToast) existingToast.remove();
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas fa-info-circle"></i> ${message}`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Search Music dari API
        async function searchMusic(query) {
            if (!query.trim()) {
                resultsList.innerHTML = '<div class="empty-message"><i class="fas fa-exclamation-triangle"></i> Masukkan judul lagu</div>';
                return;
            }

            resultsList.innerHTML = '<div class="loading-indicator"><i class="fas fa-spinner fa-pulse"></i> Mencari lagu...</div>';

            try {
                const response = await fetch(`https://api-faa.my.id/faa/ytplay?query=${encodeURIComponent(query)}`);
                
                if (!response.ok) {
                    throw new Error(`API error: ${response.status}`);
                }
                
                const data = await response.json();

                if (data.status && data.result) {
                    const r = data.result;
                    const durationFormatted = r.duration_timestamp || formatDuration(r.duration);
                    
                    resultsList.innerHTML = `
                        <div class="result-item" 
                             data-title="${escapeHtml(r.title)}" 
                             data-url="${r.mp3}" 
                             data-thumb="${r.thumbnail}" 
                             data-author="${escapeHtml(r.author)}" 
                             data-duration="${r.duration}">
                            <img src="${r.thumbnail}" class="result-thumb" onerror="this.src='https://via.placeholder.com/55x55?text=🎵'">
                            <div class="result-info">
                                <div class="result-title">${escapeHtml(r.title)}</div>
                                <div class="result-artist">${escapeHtml(r.author)}</div>
                                <div class="result-duration">⏱️ ${durationFormatted}</div>
                            </div>
                        </div>
                    `;
                    
                    const resultItem = document.querySelector('.result-item');
                    if (resultItem) {
                        resultItem.addEventListener('click', function() {
                            const title = this.getAttribute('data-title');
                            const url = this.getAttribute('data-url');
                            const thumb = this.getAttribute('data-thumb');
                            const author = this.getAttribute('data-author');
                            playMusic(title, url, thumb, author);
                        });
                    }
                } else {
                    resultsList.innerHTML = '<div class="empty-message"><i class="fas fa-music-slash"></i> Lagu tidak ditemukan, coba kata kunci lain</div>';
                }
            } catch (error) {
                console.error(error);
                resultsList.innerHTML = '<div class="empty-message"><i class="fas fa-wifi"></i> Error koneksi, coba lagi nanti</div>';
                showToast('⚠️ Gagal mengambil data dari server');
            }
        }

        // Play Music
        function playMusic(title, url, thumbnail, author) {
            if (!url) {
                showToast('❌ URL lagu tidak valid');
                return;
            }

            currentTrack = { title, url, thumbnail, author };
            audioElement.src = url;
            audioElement.load();
            
            audioElement.play().then(() => {
                isPlaying = true;
                updateNowPlayingUI();
                
                const trackToSave = {
                    title: currentTrack.title,
                    url: currentTrack.url,
                    thumbnail: currentTrack.thumbnail,
                    author: currentTrack.author,
                    currentTime: 0,
                    isPlaying: true
                };
                localStorage.setItem('bizzy_music_track', JSON.stringify(trackToSave));
                
                showToast(`🎵 Memutar: ${title}`);
            }).catch(err => {
                console.log('Play error:', err);
                showToast('⚠️ Gagal memutar lagu, coba lagi');
            });
        }

        // Update UI Now Playing
        function updateNowPlayingUI() {
            if (currentTrack) {
                nowPlayingCard.style.display = 'block';
                nowPlayingThumb.src = currentTrack.thumbnail || 'https://via.placeholder.com/70x70?text=🎵';
                nowPlayingTitle.innerText = currentTrack.title || 'Unknown Title';
                nowPlayingArtist.innerText = currentTrack.author || 'Unknown Artist';
                playPauseBtn.innerHTML = isPlaying ? '<i class="fas fa-pause"></i>' : '<i class="fas fa-play"></i>';
                
                if (audioElement.duration && !isNaN(audioElement.duration)) {
                    durationTimeSpan.innerText = formatDuration(audioElement.duration);
                }
            } else {
                nowPlayingCard.style.display = 'none';
            }
        }

        // Update progress bar
        function updateProgress() {
            if (audioElement.duration && !isNaN(audioElement.duration) && audioElement.duration > 0) {
                const percent = (audioElement.currentTime / audioElement.duration) * 100;
                progressFilled.style.width = percent + '%';
                currentTimeSpan.innerText = formatDuration(audioElement.currentTime);
                durationTimeSpan.innerText = formatDuration(audioElement.duration);
            }
        }

        // Set progress when clicked
        function setProgress(e) {
            const rect = progressBar.getBoundingClientRect();
            const percent = (e.clientX - rect.left) / rect.width;
            if (audioElement.duration && !isNaN(audioElement.duration)) {
                audioElement.currentTime = percent * audioElement.duration;
            }
        }

        // Toggle Play/Pause
        function togglePlayPause() {
            if (!currentTrack) {
                showToast('Pilih lagu terlebih dahulu');
                return;
            }
            if (isPlaying) {
                audioElement.pause();
                isPlaying = false;
                playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
                saveCurrentState();
            } else {
                audioElement.play().then(() => {
                    isPlaying = true;
                    playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
                    saveCurrentState();
                }).catch(e => console.log);
            }
        }

        // Stop Music
        function stopMusic() {
            if (!currentTrack) return;
            audioElement.pause();
            audioElement.src = '';
            currentTrack = null;
            isPlaying = false;
            nowPlayingCard.style.display = 'none';
            localStorage.removeItem('bizzy_music_track');
            showToast('⏹️ Musik dihentikan');
        }

        // Volume Control
        function setVolume(value) {
            const vol = Math.min(1, Math.max(0, value / 100));
            audioElement.volume = vol;
            volumeSlider.value = value;
            localStorage.setItem('bizzy_music_volume', vol);
        }

        function volumeUp() {
            let newVol = Math.min(100, (audioElement.volume * 100) + 10);
            setVolume(newVol);
        }

        function volumeDown() {
            let newVol = Math.max(0, (audioElement.volume * 100) - 10);
            setVolume(newVol);
        }

        // Save current playing state
        function saveCurrentState() {
            if (currentTrack) {
                const trackState = {
                    title: currentTrack.title,
                    url: currentTrack.url,
                    thumbnail: currentTrack.thumbnail,
                    author: currentTrack.author,
                    currentTime: audioElement.currentTime,
                    isPlaying: isPlaying
                };
                localStorage.setItem('bizzy_music_track', JSON.stringify(trackState));
            }
        }

        // Auto save periodically
        function setupAutoSave() {
            setInterval(() => {
                if (currentTrack && audioElement.src) {
                    saveCurrentState();
                }
            }, 5000);
            
            audioElement.addEventListener('timeupdate', () => {
                if (currentTrack && audioElement.src) {
                    updateProgress();
                }
            });
        }

        // Load saved music from localStorage
        function loadSavedMusic() {
            const savedTrack = localStorage.getItem('bizzy_music_track');
            const savedVolume = localStorage.getItem('bizzy_music_volume');
            
            if (savedVolume) {
                const vol = parseFloat(savedVolume);
                audioElement.volume = Math.min(1, Math.max(0, vol));
                volumeSlider.value = vol * 100;
            } else {
                audioElement.volume = 0.7;
                volumeSlider.value = 70;
            }
            
            if (savedTrack) {
                try {
                    const track = JSON.parse(savedTrack);
                    if (track.url && track.url !== 'undefined' && track.url !== '') {
                        currentTrack = {
                            title: track.title || 'Unknown',
                            url: track.url,
                            thumbnail: track.thumbnail || 'https://via.placeholder.com/70x70?text=🎵',
                            author: track.author || 'Unknown Artist'
                        };
                        audioElement.src = track.url;
                        if (track.currentTime) audioElement.currentTime = track.currentTime;
                        if (track.isPlaying) {
                            audioElement.play().then(() => {
                                isPlaying = true;
                                updateNowPlayingUI();
                            }).catch(e => console.log('Auto play error:', e));
                        } else {
                            isPlaying = false;
                            updateNowPlayingUI();
                        }
                        updateNowPlayingUI();
                    }
                } catch(e) {
                    console.log('Error loading saved track:', e);
                }
            }
        }

        // Kembali ke halaman utama (tools.html)
        function goBackToHome() {
            // Simpan state sebelum pindah
            if (currentTrack) {
                saveCurrentState();
            }
            window.location.href = 'tools.html';
        }

        // Event Listeners
        audioElement.addEventListener('ended', () => {
            isPlaying = false;
            playPauseBtn.innerHTML = '<i class="fas fa-play"></i>';
            showToast('⏹️ Pemutaran selesai');
        });

        audioElement.addEventListener('error', (e) => {
            console.error('Audio error:', e);
            showToast('❌ Gagal memutar lagu, coba cari lagu lain');
        });

        audioElement.addEventListener('loadedmetadata', () => {
            if (currentTrack) {
                durationTimeSpan.innerText = formatDuration(audioElement.duration);
            }
        });

        // Search listeners
        searchBtn.addEventListener('click', () => {
            searchMusic(searchInput.value);
        });

        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                searchMusic(searchInput.value);
            }
        });

        // Control listeners
        playPauseBtn.addEventListener('click', togglePlayPause);
        stopBtn.addEventListener('click', stopMusic);
        volumeUpBtn.addEventListener('click', volumeUp);
        volumeDownBtn.addEventListener('click', volumeDown);
        volumeSlider.addEventListener('input', (e) => setVolume(parseInt(e.target.value)));
        progressBar.addEventListener('click', setProgress);

        // Initialize
        setupAutoSave();
        loadSavedMusic();

        // Welcome message
        setTimeout(() => {
            showToast('🎧 Selamat datang di Bizzy Music! Cari lagu favoritmu.');
        }, 500);
    </script>
</body>
</html>
