<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Sewa - Rayy Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="data-sewa.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <h1>Rayy Store</h1>
            </div>
            <h2>Data Sewa Bot</h2>
            <p class="subtitle">Isi data berikut untuk melanjutkan sewa bot</p>

            <div class="order-summary" id="orderSummary"></div>

            <div class="form-group">
                <label><i class="fas fa-user"></i> Nama Pembeli</label>
                <input type="text" id="buyerName" placeholder="Masukkan nama lengkap Anda">
            </div>

            <div class="form-group">
                <label><i class="fab fa-whatsapp"></i> Nomor WhatsApp</label>
                <input type="text" id="buyerPhone" placeholder="628xxxxxxxxxx">
            </div>

            <div class="form-group">
                <label><i class="fab fa-whatsapp"></i> Link Grup WhatsApp</label>
                <input type="text" id="linkGroup" placeholder="https://chat.whatsapp.com/...">
            </div>

            <button class="btn-submit" onclick="submitData()">
                <i class="fas fa-arrow-right"></i> Lanjut ke Pembayaran
            </button>

            <div class="back-link">
                <a href="rayy-store.com.html"><i class="fas fa-arrow-left"></i> Kembali ke Toko</a>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="data-sewa.js"></script>
</body>
</html>
