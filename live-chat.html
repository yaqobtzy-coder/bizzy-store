<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Live Chat - Rayy Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#f8fafc;font-family:'Inter',sans-serif;overflow-x:hidden;color:#1e293b}
        
        /* SIDEBAR */
        .sidebar{position:fixed;top:0;left:-280px;width:280px;height:100%;background:#fff;z-index:1002;transition:left .3s;display:flex;flex-direction:column;box-shadow:2px 0 10px rgba(0,0,0,.1);border-right:1px solid #e2e8f0}
        .sidebar.open{left:0}
        .sidebar-header{display:flex;justify-content:space-between;align-items:center;padding:20px;border-bottom:1px solid #e2e8f0}
        .sidebar-logo{font-size:20px;font-weight:700;color:#0f172a}
        .sidebar-logo span{color:#3b82f6}
        .sidebar-close{background:0;border:none;font-size:24px;color:#94a3b8;cursor:pointer}
        .sidebar-close:hover{color:#ef4444}
        .sidebar-profile{padding:20px;text-align:center;border-bottom:1px solid #e2e8f0}
        .sidebar-avatar i{font-size:60px;color:#3b82f6}
        .sidebar-name{font-weight:600;color:#0f172a;margin-top:8px}
        .sidebar-email{font-size:11px;color:#94a3b8;margin-top:4px}
        .sidebar-nav{flex:1;padding:20px 0}
        .sidebar-link{display:flex;align-items:center;gap:12px;padding:12px 20px;color:#475569;text-decoration:none;font-size:14px;font-weight:500}
        .sidebar-link:hover{background:#f1f5f9;color:#3b82f6}
        .sidebar-link.active{background:#eef2ff;color:#3b82f6;border-right:3px solid #3b82f6}
        .sidebar-footer{padding:20px;border-top:1px solid #e2e8f0}
        .cart-icon-sidebar{display:flex;align-items:center;gap:12px;padding:10px;background:#f8fafc;border-radius:12px;cursor:pointer}
        .cart-icon-sidebar:hover{background:#eef2ff}
        .cart-icon-sidebar i{font-size:18px;color:#3b82f6}
        .cart-icon-sidebar .cart-count{background:#3b82f6;color:#fff;border-radius:50%;padding:2px 6px;font-size:10px;font-weight:600;min-width:18px;text-align:center}
        .cart-icon-sidebar span:last-child{flex:1;color:#475569;font-weight:500}
        .overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:1001;display:none}
        .overlay.active{display:block}
        
        /* TOP NAVBAR */
        .top-navbar{background:#fff;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100;border-bottom:1px solid #e2e8f0}
        .menu-toggle{background:0;border:none;font-size:22px;color:#475569;cursor:pointer}
        .logo-small{font-size:18px;font-weight:700;color:#0f172a}
        .logo-small span{color:#3b82f6}
        
        /* MAIN */
        .main-content{min-height:100vh}
        .container{max-width:900px;margin:0 auto;padding:30px 20px}
        .page-header{text-align:center;margin-bottom:30px}
        .page-header h1{font-size:28px;font-weight:700;color:#0f172a;margin-bottom:8px}
        .page-header h1 i{color:#3b82f6}
        .page-header p{color:#64748b;font-size:14px}
        
        /* CHAT CONTAINER */
        .chat-container{background:#fff;border-radius:20px;border:1px solid #e2e8f0;overflow:hidden;display:flex;flex-direction:column;height:70vh}
        .chat-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
        .message{display:flex;flex-direction:column;max-width:75%}
        .message-left{align-items:flex-start}
        .message-right{align-items:flex-end;margin-left:auto}
        .message-bubble{background:#f1f5f9;padding:10px 14px;border-radius:18px;border-bottom-left-radius:4px;color:#1e293b;font-size:13px;word-break:break-word}
        .message-right .message-bubble{background:#3b82f6;color:white;border-bottom-right-radius:4px;border-bottom-left-radius:18px}
        .message-info{font-size:10px;color:#94a3b8;margin-top:4px;display:flex;gap:8px}
        .message-name{font-weight:600}
        .chat-input-area{display:flex;gap:12px;padding:16px;border-top:1px solid #e2e8f0;background:#fff}
        .chat-input-area input{flex:1;padding:12px;border:1px solid #e2e8f0;border-radius:30px;font-size:14px;outline:none}
        .chat-input-area input:focus{border-color:#3b82f6}
        .chat-input-area button{background:#3b82f6;border:none;padding:12px 24px;border-radius:30px;color:#fff;font-weight:600;cursor:pointer}
        .chat-input-area button:hover{background:#2563eb}
        .chat-input-area button:disabled{opacity:0.5;cursor:not-allowed}
        .online-status{display:inline-block;width:10px;height:10px;border-radius:50%;background:#22c55e;margin-right:6px}
        .typing-indicator{font-size:11px;color:#94a3b8;padding:8px 16px;font-style:italic}
        
        .empty-chat{text-align:center;padding:60px;color:#94a3b8}
        .empty-chat i{font-size:60px;margin-bottom:16px;opacity:0.5}
        
        @media (max-width:768px){
            .page-header h1{font-size:22px}
            .message{max-width:85%}
            .sidebar{width:260px;left:-260px}
            .chat-container{height:60vh}
        }
        @media (min-width:769px){.menu-toggle{display:none}}
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="sidebar-logo">Rayy<span>Store</span></div>
            <button class="sidebar-close" id="sidebarClose">&times;</button>
        </div>
        <div class="sidebar-profile">
            <div class="sidebar-avatar"><i class="fas fa-user-circle"></i></div>
            <div class="sidebar-name" id="sidebarName">Customer</div>
            <div class="sidebar-email" id="sidebarEmail">customer@rayystore.com</div>
        </div>
        <nav class="sidebar-nav">
            <a href="rayy-store.com.html" class="sidebar-link"><i class="fas fa-home"></i> Beranda</a>
            <a href="profile.html" class="sidebar-link"><i class="fas fa-user"></i> Profil</a>
            <a href="vouchers.html" class="sidebar-link"><i class="fas fa-ticket-alt"></i> Voucher</a>
            <a href="news.com.html" class="sidebar-link"><i class="fas fa-newspaper"></i> News</a>
            <a href="buy-panel.html" class="sidebar-link"><i class="fas fa-server"></i> Panel</a>
            <a href="#" id="sidebarMusicBtn" class="sidebar-link"><i class="fas fa-music"></i> Musik</a>
            <a href="history.html" class="sidebar-link"><i class="fas fa-history"></i> Histori Belanja</a>
            <a href="active-sewa.html" class="sidebar-link"><i class="fas fa-calendar-check"></i> Sewa Aktif</a>
            <a href="live-chat.html" class="sidebar-link active"><i class="fas fa-comments"></i> Live Chat</a>
            <a href="cs-chat.html" class="sidebar-link"><i class="fas fa-headset"></i> Customer Service</a>
        </nav>
        <div class="sidebar-footer">
            <div class="cart-icon-sidebar" onclick="window.location.href='rayy-store.com.html'">
                <i class="fas fa-shopping-bag"></i>
                <span class="cart-count" id="sidebarCartCount">0</span>
                <span>Keranjang</span>
            </div>
        </div>
    </div>
    <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

    <div class="main-content">
        <nav class="top-navbar">
            <button class="menu-toggle" id="menuToggle"><i class="fas fa-bars"></i></button>
            <div class="logo-small">Rayy<span>Store</span></div>
            <div></div>
        </nav>

        <div class="container">
            <div class="page-header">
                <h1><i class="fas fa-comments"></i> Live Chat</h1>
                <p>Chat dengan semua pengguna Rayy Store secara realtime</p>
            </div>

            <div class="chat-container">
                <div class="chat-messages" id="chatMessages">
                    <div class="empty-chat">
                        <i class="fas fa-comment-dots"></i>
                        <p>Belum ada pesan. Jadilah yang pertama!</p>
                    </div>
                </div>
                <div class="typing-indicator" id="typingIndicator" style="display:none">
                    <i class="fas fa-ellipsis-h"></i> Seseorang sedang mengetik...
                </div>
                <div class="chat-input-area">
                    <input type="text" id="messageInput" placeholder="Tulis pesan..." maxlength="500">
                    <button id="sendBtn" onclick="sendMessage()"><i class="fas fa-paper-plane"></i> Kirim</button>
                </div>
            </div>
        </div>
    </div>

    <audio id="notificationSound" style="display:none">
        <source src="https://www.soundjay.com/misc/sounds/bell-ringing-05.mp3" type="audio/mpeg">
    </audio>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="live-chat.js"></script>
</body>
</html>
