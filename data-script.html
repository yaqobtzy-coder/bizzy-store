<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Script - Rayy Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="data-script.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="logo">
                <h1>Rayy Store</h1>
            </div>
            <h2>Data Script Bot</h2>
            <p class="subtitle">Isi data berikut untuk pembelian script bot</p>

            <div class="order-summary" id="orderSummary"></div>

            <form id="scriptForm">
                <div class="form-section">
                    <h3><i class="fas fa-star-of-life" style="color: #ff6b6b;"></i> Data Wajib</h3>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Nama Owner <span style="color:#ff6b6b">*</span></label>
                            <input type="text" id="ownerName" placeholder="Nama pemilik bot">
                        </div>
                        <div class="form-group">
                            <label>Nomor Owner <span style="color:#ff6b6b">*</span></label>
                            <input type="text" id="ownerPhone" placeholder="628xxxxxxxxxx">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Nomor Bot untuk di ACC <span style="color:#ff6b6b">*</span></label>
                        <input type="text" id="botNumber" placeholder="Nomor Telegram/WA bot">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Nama Bot 1 <span style="color:#ff6b6b">*</span></label>
                            <input type="text" id="botName1" placeholder="Contoh: Bot Utama">
                        </div>
                        <div class="form-group">
                            <label>Nama Bot 2 <span style="color:#ff6b6b">*</span></label>
                            <input type="text" id="botName2" placeholder="Contoh: Bot Cadangan">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Nama Bot 3 <span style="color:#ff6b6b">*</span></label>
                            <input type="text" id="botName3" placeholder="Contoh: Bot Admin">
                        </div>
                        <div class="form-group">
                            <label>Custom Pairing <span style="color:#ff6b6b">*</span></label>
                            <input type="text" id="customPairing" placeholder="Pairing code">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Package Sticker <span style="color:#ff6b6b">*</span></label>
                            <input type="text" id="packageSticker" placeholder="Nama package sticker">
                        </div>
                        <div class="form-group">
                            <label>Author STC <span style="color:#ff6b6b">*</span></label>
                            <input type="text" id="authorStc" placeholder="Nama author">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <h3><i class="fas fa-plus-circle"></i> Data Opsional <span class="optional-badge">Optional</span></h3>
                    
                    <div class="form-group">
                        <label>Link Grup</label>
                        <input type="text" id="linkGroup" placeholder="https://t.me/...">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Link Saluran</label>
                            <input type="text" id="linkChannel" placeholder="https://t.me/...">
                        </div>
                        <div class="form-group">
                            <label>Nama Saluran</label>
                            <input type="text" id="channelName" placeholder="Nama channel Telegram">
                        </div>
                    </div>
                </div>
            </form>

            <button class="btn-submit" onclick="submitData()">
                <i class="fas fa-arrow-right"></i> Lanjut ke Pembayaran
            </button>

            <div class="back-link">
                <a href="rayy-store.com.html"><i class="fas fa-arrow-left"></i> Kembali ke Toko</a>
            </div>
        </div>
    </div>

    <div id="loadingOverlay" class="loading-overlay" style="display: none;">
        <div class="loading-content">
            <i class="fas fa-spinner fa-spin"></i>
            <p>Memproses data...</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="telegram-notif.js"></script>
    <script src="data-script.js"></script>
</body>
</html>
